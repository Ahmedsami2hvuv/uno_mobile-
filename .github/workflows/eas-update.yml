# عند الدفع (push) لفرع main ينشر تحديث EAS تلقائياً
# التطبيق على الجوال يجلبه عند الفتح
name: EAS Update on Push

on:
  push:
    branches: [main]

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        run: eas update --branch preview --message "تحديث من GitHub" --non-interactive
